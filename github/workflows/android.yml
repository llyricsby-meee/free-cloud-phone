name: Free Cloud Android Phone

on:
  workflow_dispatch: # इससे आप जब चाहें बटन दबाकर इसे चालू कर पाएंगे

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install Android Emulator & Tools
      run: |
        sudo apt update
        # एंड्रॉइड टूल्स और VNC (स्क्रीन देखने के लिए) इंस्टॉल करना
        sudo apt install -y qemu-kvm libvirt-daemon-system libvirt-clients bridge-utils xfce4 xfce4-goodies tightvncserver websockify
        
    - name: Setup Ngrok
      run: |
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt update && sudo apt install ngrok
        ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

    - name: Start Android Server & Stream
      run: |
        # यहाँ बैकएंड में एंड्रॉइड एमुलेटर और VNC सर्वर को चालू किया जा रहा है
        mkdir -p ~/.vnc
        echo "cloud123" | vncpasswd -f > ~/.vnc/passwd
        chmod 600 ~/.vnc/passwd
        tightvncserver :1 -geometry 1280x720 -depth 24
        
        # वेब ब्राउज़र में देखने के लिए पोर्ट 6080 पर चालू करना
        websockify --web /usr/share/novnc/ 6080 localhost:5901 &
        
        # Ngrok के जरिए इंटरनेट पर लिंक लाइव करना
        ngrok http 6080 --log=stdout > /dev/null &
        
        echo "=== आपका क्लाउड फोन शुरू हो रहा है... अगले स्टेप में लिंक देखें ==="
        sleep 10
        curl --silent http://127.0.0.1:4040/api/tunnels | jq '.tunnels[0].public_url'

    - name: Keep Server Alive (6 Hours)
      run: sleep 21600 # सर्वर को 6 घंटे तक चालू रखेगा
