name: Free Cloud Android Phone With PlayStore

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y qemu-kvm libvirt-daemon-system libvirt-clients bridge-utils xfce4 xfce4-goodies tightvncserver websockify jq
        
    - name: Download Google Play Android Image
      run: |
        # यहाँ बैकएंड में प्ले स्टोर वाली एंड्रॉइड इमेज और SDK टूल्स सेटअप हो रहे हैं
        sudo apt install -y android-sdk
        echo "=== प्ले स्टोर वाला एंड्रॉइड सिस्टम डाउनलोड हो रहा है... ==="
        # यह कमांड प्ले स्टोर सपोर्टेड एंड्रॉइड 11 (API 30) डाउनलोड करेगी
        sdkmanager "system-images;android-30;google_apis_playstore;x86_64" --sdk_root=$ANDROID_HOME
        echo "no" | avdmanager create avd -n CloudPhone -k "system-images;android-30;google_apis_playstore;x86_64" --force

    - name: Setup Ngrok
      run: |
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt update && sudo apt install ngrok
        ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

    - name: Start Android Emulator & Web Access
      run: |
        # डिस्प्ले और वीएनसी सर्वर चालू करना
        mkdir -p ~/.vnc
        echo "cloud123" | vncpasswd -f > ~/.vnc/passwd
        chmod 600 ~/.vnc/passwd
        tightvncserver :1 -geometry 1280x720 -depth 24
        websockify --web /usr/share/novnc/ 6080 localhost:5901 &
        
        # प्ले स्टोर वाले एंड्रॉइड एमुलेटर को बैकएंड में रन करना
        export DISPLAY=:1
        $ANDROID_HOME/emulator/emulator -avd CloudPhone -no-audio -no-boot-anim -gpu swiftshader_indirect &
        
        # Ngrok टनल चालू करना ताकि आप ब्राउज़र में देख सकें
        ngrok http 6080 --log=stdout > /dev/null &
        
        echo "=== आपका प्ले स्टोर वाला क्लाउड फोन तैयार है! ==="
        sleep 15
        curl --silent http://127.0.0.1:4040/api/tunnels | jq '.tunnels[0].public_url'

    - name: Keep Server Alive (6 Hours)
      run: sleep 21600
